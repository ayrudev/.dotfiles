$module = ~/.config/hypr/modules
source = $module/dwindle
source = $module/keybinds
source = $module/envs
source = $module/exec
source = $module/winrules
source = $module/gestures

monitor = eDP-1,preferred,auto,1

general {
    border_size = 2
    gaps_in = 3
    gaps_out = 6
    col.inactive_border = 0xff333333
    col.active_border = 0xffffffff
    layout = dwindle
    allow_tearing = false
}

decoration {
    rounding = 3
    rounding_power = 2
    dim_inactive = false
    dim_strength = 0.5
    dim_special = 0.5

    blur {
        enabled = true
        size = 4
        passes = 2
        noise = 0
        contrast = 1
        brightness = 1
        vibrancy = 1
    }

    shadow {
		enabled = false
	}
}

animations {
	enabled = true
	bezier = easeOutExpo, 0.16, 1, 0.3, 1
	
	animation = windows, 1, 2, easeOutExpo, gnomed
	animation = layers, 1, 2, easeOutExpo, popin
	animation = workspaces, 1, 2, easeOutExpo, slide
	animation = specialWorkspace, 1, 2, easeOutExpo, slidevert
}

input {
    kb_layout = br
    numlock_by_default = true
    sensitivity = 0.3 
    accel_profile = flat

    touchpad {
        disable_while_typing = true
        natural_scroll = true
        scroll_factor = 0.5
    }
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    mouse_move_enables_dpms = true
}

ecosystem {
    no_update_news = true
    no_donation_nag = true
    enforce_permissions = false # enable once it's mature
}
