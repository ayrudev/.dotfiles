# --- BACKGROUND STYLING --- #

background {
    monitor =
    path = ~/Pictures/wallpapers/17.png
    blur_passes = 2
    blur_size = 4
}

# --- GENERAL SETTINGS --- #

general {
    disable_loading_bar = true
    hide_cursor = true
}

# --- INPUT FIELD --- #

input-field { 
    rounding = 3
    monitor =
    size = 10%, 5%
    outline_thickness = 2
    dots_center = true
    outer_color = rgba(255, 255, 255, 1) 
    inner_color = rgba(0, 0, 0, 0.8) 
    font_color = rgba(255, 255, 255, 1)
    fade_on_empty = true
    placeholder_text = 
    hide_input = false
    position = 0, 100
    halign = center
    valign = bottom
    fail_color = rgb(204, 34, 34)
}


# --- LABELS (Clock/Date) CONFIG --- #

label {
  monitor =
  text = cmd[update:1000] echo "$(date +"%A, %B %d")"
  color = rgb(251, 241, 199)
  font_size = 31
  font_family = Iosevka Nerd Font Bold
  position = 0, 325
  halign = center
  valign = center
}

label {
  monitor = 
  text = cmd[update:1000] echo "$(date +"%k:%M")"
  color = rgb(251, 241, 199)
  font_size = 150
  font_family = Iosevka Nerd Font Bold
  position = 0, 200
  halign = center
  valign = center
}


# --- PROFILE PICTURE CONFIG --- #

image {
  monitor =
  path = ~/Pictures/pfp.jpg 
  border_color = rgb(251, 241, 199)
  border_size = 2
  size = 120
  rounding = -1
  rotate = 0
  reload_time = -1
  reload_cmd = 
  position = 0, 200
  halign = center
  valign = bottom
}

# --- USERNAME CONFIG --- #

label {
  monitor = 
  text = $USER
  color = rgb(251, 241, 199)
  font_size = 10
  font_family = Iosevka Nerd Font Bold 
  position = 0, 160
  halign = center
  valign = bottom
  shadow_passes = 2
  shadow_size = 8
  shadow_color = rgb(60, 56, 54)
}
